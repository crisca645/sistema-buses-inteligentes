<div class="auth-page">
  <mat-card class="auth-card mat-elevation-z4">
    <h1>Verificación en dos pasos</h1>
    <p class="subtitle">
      Introduce el código de 6 dígitos enviado
      @if (maskedEmail) {
        a <strong>{{ maskedEmail }}</strong>
      }
    </p>

    <form (ngSubmit)="verify()" [formGroup]="form" class="form">
      <mat-form-field appearance="outline" class="full">
        <mat-label>Código</mat-label>
        <input matInput formControlName="code" inputmode="numeric" maxlength="6" />
        @if (form.controls.code.touched && form.controls.code.invalid) {
          <mat-error>6 dígitos numéricos</mat-error>
        }
      </mat-form-field>
      <button mat-flat-button color="primary" class="full" type="submit" [disabled]="busy">
        Verificar
      </button>
    </form>

    <div class="actions">
      <button mat-button type="button" (click)="resend()" [disabled]="busy">Reenviar código</button>
      <button mat-button type="button" color="warn" (click)="cancel()" [disabled]="busy">Cancelar</button>
    </div>
  </mat-card>
</div>
