<h1>Roles</h1>
<p class="hint">Contratos reales: GET/POST <code>/roles</code>, PUT/DELETE <code>/roles/&#123;id&#125;</code></p>

<mat-card>
  <mat-toolbar color="primary">
    <span>Listado</span>
    <span class="spacer"></span>
    <button mat-icon-button type="button" aria-label="Refrescar" (click)="refresh()">
      <mat-icon>refresh</mat-icon>
    </button>
    <button mat-flat-button type="button" (click)="openCreate()">Nuevo rol</button>
  </mat-toolbar>

  <table mat-table [dataSource]="roles" class="table">
    <ng-container matColumnDef="name">
      <th mat-header-cell *matHeaderCellDef>Nombre</th>
      <td mat-cell *matCellDef="let r">{{ r.name }}</td>
    </ng-container>
    <ng-container matColumnDef="description">
      <th mat-header-cell *matHeaderCellDef>Descripción</th>
      <td mat-cell *matCellDef="let r">{{ r.description }}</td>
    </ng-container>
    <ng-container matColumnDef="actions">
      <th mat-header-cell *matHeaderCellDef></th>
      <td mat-cell *matCellDef="let r">
        <button mat-icon-button type="button" (click)="openEdit(r)" aria-label="Editar">
          <mat-icon>edit</mat-icon>
        </button>
        <button mat-icon-button type="button" color="warn" (click)="remove(r)" aria-label="Eliminar">
          <mat-icon>delete</mat-icon>
        </button>
      </td>
    </ng-container>
    <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
    <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
  </table>
  @if (!loading && roles.length === 0) {
    <p class="empty">Sin datos o sin permisos para listar.</p>
  }
</mat-card>
