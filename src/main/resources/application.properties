spring.application.name=ms-security
server.port=8383
spring.profiles.active=local

spring.data.mongodb.uri=${MONGODB_URI}
spring.data.mongodb.database=${MONGODB_DATABASE:db_security}

jwt.secret=${JWT_SECRET}
jwt.expiration=${JWT_EXPIRATION:3600000}

google.client-id=${GOOGLE_CLIENT_ID:}
microsoft.client-id=${MICROSOFT_CLIENT_ID:}

spring.security.oauth2.client.registration.github.client-id=${GITHUB_CLIENT_ID:}
spring.security.oauth2.client.registration.github.client-secret=${GITHUB_CLIENT_SECRET:}
spring.security.oauth2.client.registration.github.scope=read:user,user:email

spring.security.oauth2.client.registration.microsoft.client-id=${MICROSOFT_CLIENT_ID:}
spring.security.oauth2.client.registration.microsoft.client-secret=${MICROSOFT_CLIENT_SECRET:}
spring.security.oauth2.client.registration.microsoft.scope=openid,profile,email
spring.security.oauth2.client.registration.microsoft.authorization-grant-type=authorization_code
spring.security.oauth2.client.registration.microsoft.redirect-uri=${MICROSOFT_REDIRECT_URI:http://localhost:8080/login/oauth2/code/microsoft}

spring.security.oauth2.client.provider.microsoft.authorization-uri=${MICROSOFT_AUTH_URI:https://login.microsoftonline.com/common/oauth2/v2.0/authorize}
spring.security.oauth2.client.provider.microsoft.token-uri=${MICROSOFT_TOKEN_URI:https://login.microsoftonline.com/common/oauth2/v2.0/token}
spring.security.oauth2.client.provider.microsoft.user-info-uri=${MICROSOFT_USERINFO_URI:https://graph.microsoft.com/oidc/userinfo}
spring.security.oauth2.client.provider.microsoft.jwk-set-uri=${MICROSOFT_JWK_URI:https://login.microsoftonline.com/common/discovery/v2.0/keys}
spring.security.oauth2.client.provider.microsoft.user-name-attribute=sub

spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID:}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET:}
spring.security.oauth2.client.registration.google.scope=openid,profile,email

recaptcha.secret=${RECAPTCHA_SECRET:}
recaptcha.site-key=${RECAPTCHA_SITE_KEY:}

spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=${MAIL_SMTP_AUTH:true}
spring.mail.properties.mail.smtp.starttls.enable=${MAIL_SMTP_STARTTLS_ENABLE:true}

app.mail.from=${APP_MAIL_FROM:${MAIL_USERNAME:}}
app.2fa.code.expiration-ms=${APP_2FA_CODE_EXPIRATION_MS:300000}

server.error.include-message=always