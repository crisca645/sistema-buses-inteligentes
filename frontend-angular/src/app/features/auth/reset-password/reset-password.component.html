<div class="auth-page">
  <mat-card class="auth-card mat-elevation-z4">
    <h1>Nueva contraseña</h1>
    @if (!token) {
      <p class="warn">Abre el enlace del correo o añade <code>?token=...</code> en la URL.</p>
    }

    <form [formGroup]="form" (ngSubmit)="submit()" class="form">
      <mat-form-field appearance="outline" class="full">
        <mat-label>Nueva contraseña</mat-label>
        <input matInput type="password" formControlName="newPassword" />
      </mat-form-field>
      <mat-form-field appearance="outline" class="full">
        <mat-label>Confirmar</mat-label>
        <input matInput type="password" formControlName="confirmPassword" />
        @if (form.errors?.['mismatch'] && form.touched) {
          <mat-error>No coinciden</mat-error>
        }
      </mat-form-field>
      <button mat-flat-button color="primary" class="full" type="submit" [disabled]="submitting || !token">
        Guardar
      </button>
    </form>
    <div class="links"><a routerLink="/login">Ir al login</a></div>
  </mat-card>
</div>
