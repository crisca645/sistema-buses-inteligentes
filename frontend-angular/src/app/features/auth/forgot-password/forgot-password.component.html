<div class="auth-page">
  <mat-card class="auth-card mat-elevation-z4">
    <h1>Recuperar contraseña</h1>
    <p class="subtitle">Te enviaremos instrucciones si el correo existe en el sistema.</p>

    @if (!recaptchaConfigured) {
      <p class="warn">Configura <code>recaptchaSiteKey</code> en environment.ts</p>
    }

    <form [formGroup]="form" (ngSubmit)="submit()" class="form">
      <mat-form-field appearance="outline" class="full">
        <mat-label>Correo</mat-label>
        <input matInput type="email" formControlName="email" />
      </mat-form-field>
      <button mat-flat-button color="primary" class="full" type="submit" [disabled]="submitting">
        Enviar
      </button>
    </form>
    <div class="links"><a routerLink="/login">Volver al login</a></div>
  </mat-card>
</div>
